<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg-dark: #0f172a;
            --text-main: rgba(255, 255, 255, 0.95);
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            pointer-events: none;
            animation: float 25s ease-in-out infinite alternate;
        }
        body::before {
            width: 550px;
            height: 550px;
            background: rgba(79, 172, 254, 0.12);
            top: -200px;
            left: -150px;
        }
        body::after {
            width: 450px;
            height: 450px;
            background: rgba(255, 117, 140, 0.1);
            bottom: -150px;
            right: -100px;
            animation-delay: -12s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.1); }
        }

        .edit-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(25px);
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(79, 172, 254, 0.15);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 700;
            text-align: center;
            font-size: 32px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 25px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--secondary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        input[type="file"] {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            padding: 10px 0;
            width: 100%;
        }

        button[type="submit"] {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            margin-top: 15px;
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
        }
    </style>
</head>

<body>

    <div class="edit-container">
        <h2>Edit Post</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <input type="text" name="title" value="{{ post.title }}" placeholder="Post Title" required>
            </div>

            <div class="form-group">
                <textarea name="content" placeholder="Post Content" rows="5">{{ post.content }}</textarea>
            </div>

            <div class="form-group">
                <input type="file" name="pdf">
            </div>

            <button type="submit">Save Changes</button>
        </form>
    </div>

</body>

</html>
