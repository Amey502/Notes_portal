<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;

            background: linear-gradient(135deg, #4facfe, #00f2fe, #a18cd1);
        }

        .nav-left a,
        .nav-right a {
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
            color: white;
        }

        .nav-left a:hover,
        .nav-right a:hover {
            opacity: 0.8;
        }

        .nav-center input {
            padding: 8px;
            width: 250px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .container {
            padding: 30px;
        }

        .team-box {
            padding: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;

            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .team-card {
            width: 160px;
            height: 160px;
            border-radius: 15px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            font-weight: bold;
            color: white;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            transition: 0.3s;
        }

        .team-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .create-card {
            width: 160px;
            height: 160px;
            border-radius: 15px;

            display: flex;
            justify-content: center;
            align-items: center;

            cursor: pointer;
            color: white;

            border: 2px dashed rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);

            transition: 0.3s;
        }

        .create-card:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .empty {
            font-size: 18px;
            color: #ccc;
        }
    </style>
</head>

<body>


    <div class="navbar">
        <div class="nav-left">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'profile' %}">Profile</a>
        </div>

        <div class="nav-center">
            <form method="GET" action="{% url 'search_team' %}" style="display:flex; align-items:center; gap:8px;">

                <input type="text" name="q" placeholder="Search teams" value="{{ request.GET.q }}" required style="
                padding:8px 12px;
                border-radius:20px;
                border:none;
                outline:none;
                width:250px;
            ">

                <button type="submit" style="
            border:none;
            padding:8px 12px;
            border-radius:50%;
            cursor:pointer;
            background:white;
        ">
                    🔍
                </button>

            </form>
        </div>

        <div class="nav-right">
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>


    <div class="container">


        {% if messages %}
        {% for m in messages %}
        <p style="color: red;">{{ m }}</p>
        {% endfor %}
        {% endif %}

        <div class="team-box">

            {% if teams %}
            {% for team in teams %}


            <a href="{% url 'team_detail' team.team_id %}" style="text-decoration:none; color:black;">
                <div class="team-card">
                    <b>{{ team.team_name }}</b>
                </div>
            </a>

            {% endfor %}
            {% else %}
            <p class="empty">No teams available</p>
            {% endif %}


            <div class="create-card" onclick="openForm()">
                + Create Team
            </div>

        </div>

    </div>


    <div id="popupForm" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
        background:white; padding:20px; border:2px solid black;">

        <form method="POST" action="{% url 'create_team' %}">
            {% csrf_token %}

            <label>Team Name:</label><br>
            <input type="text" name="team_name" required><br><br>

            <button type="submit">Create</button>
            <button type="button" onclick="closeForm()">Cancel</button>
        </form>

    </div>


    <script>
        function openForm() {
            document.getElementById("popupForm").style.display = "block";
        }

        function closeForm() {
            document.getElementById("popupForm").style.display = "none";
        }
    </script>

</body>

</html>
