<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 50px;
            background: linear-gradient(135deg, rgba(0, 114, 255, 0.4) 0%, rgba(255, 0, 128, 0.4) 100%);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left a,
        .nav-right a {
            margin-right: 20px;
            text-decoration: none;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-left a:hover,
        .nav-right a:hover {
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            opacity: 1;
        }

        .nav-center form {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .nav-center form:focus-within {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .nav-center input {
            padding: 8px 0;
            width: 250px;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        .nav-center input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .nav-center button {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s ease;
        }

        .nav-center button:hover {
            transform: scale(1.2);
        }

        .container {
            padding: 50px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .team-box {
            padding: 30px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .team-link {
            text-decoration: none;
            color: white;
        }

        .team-card {
            width: 170px;
            height: 170px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .team-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 35px rgba(79, 172, 254, 0.4);
            border-color: rgba(79, 172, 254, 0.6);
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.2), rgba(0, 242, 254, 0.05));
        }

        .create-card {
            width: 170px;
            height: 170px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        .create-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: white;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .empty {
            font-size: 18px;
            color: #94a3b8;
            width: 100%;
            text-align: center;
            padding: 40px 0;
            font-weight: 300;
        }

        .messages-alert {
            background: rgba(239, 68, 68, 0.2);
            border-left: 4px solid #ef4444;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .messages-alert p {
            color: #fca5a5;
            margin: 0;
            font-weight: 500;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 999;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        #popupForm {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #1e293b;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #popupForm input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            margin-bottom: 25px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        #popupForm input[type="text"]:focus {
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="nav-left">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'profile' %}">Profile</a>
        </div>

        <div class="nav-center">
            <form method="GET" action="{% url 'search_team' %}">
                <input type="text" name="q" placeholder="Search teams" value="{{ request.GET.q }}" required>
                <button type="submit">🔍</button>
            </form>
        </div>

        <div class="nav-right">
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>


    <div class="container">

        {% if messages %}
        <div class="messages-alert">
            {% for m in messages %}
            <p>{{ m }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <div class="team-box">

            {% if teams %}
            {% for team in teams %}

            <a href="{% url 'team_detail' team.team_id %}" class="team-link">
                <div class="team-card">
                    <b>{{ team.team_name }}</b>
                </div>
            </a>

            {% endfor %}
            {% else %}
            <p class="empty">No teams available</p>
            {% endif %}

            <div class="create-card" onclick="openForm()">
                + Create Team
            </div>

        </div>

    </div>

    <div id="overlay"></div>

    <div id="popupForm">
        <form method="POST" action="{% url 'create_team' %}">
            {% csrf_token %}

            <input type="text" name="team_name" placeholder="Team Name" required>

            <div style="display:flex; justify-content:space-between;">
                <button type="submit" class="btn-submit">Create</button>
                <button type="button" class="btn-cancel" onclick="closeForm()">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        function openForm() {
            document.getElementById("popupForm").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

        function closeForm() {
            document.getElementById("popupForm").style.display = "none";
            document.getElementById("overlay").style.display = "none";
        }
    </script>

</body>

</html>
